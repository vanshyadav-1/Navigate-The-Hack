name: navigate_the_hack
description: A clean, functional Hacker News Reader built with Flutter using clean architecture and Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation
  go_router: ^14.8.1

  # UI & Utilities
  intl: ^0.19.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  flutter_html: ^3.0.0-beta.2
  shimmer: ^3.0.0
  equatable: ^2.0.7
  cached_network_image: ^3.4.1

  # Offline Caching
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true


